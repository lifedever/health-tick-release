<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康打卡 - 成就</title>
<style>
  @import url('https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d1117; --card-bg: #161b22; --border: #30363d;
    --text: #e6edf3; --text-dim: #7d8590;
    --green-0: #161b22; --green-1: #0e4429; --green-2: #006d32;
    --green-3: #26a641; --green-4: #39d353; --accent: #39d353;
    --gold: #f0b429; --silver: #94a3b8; --bronze: #cd7f32;
  }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 40px 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header { margin-bottom: 32px; }
  header h1 { font-size: 28px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-dim); font-size: 14px; margin-top: 4px; }

  .stats-row { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 24px; flex: 1; min-width: 120px;
  }
  .stat-card .value { font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1.1; }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .section {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 24px;
  }
  .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  /* 徽章 */
  .badges { display: flex; gap: 16px; flex-wrap: wrap; }
  .badge {
    text-align: center; padding: 16px 20px; border-radius: 12px;
    background: var(--bg); border: 2px solid var(--border); min-width: 100px;
    opacity: 0.35; transition: all 0.3s;
  }
  .badge.earned { opacity: 1; border-color: var(--accent); }
  .badge .icon { font-size: 36px; margin-bottom: 6px; }
  .badge .name { font-size: 14px; font-weight: 600; }
  .badge .desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .badge .progress { font-size: 11px; color: var(--accent); margin-top: 4px; }

  /* 7天迷你图 */
  .mini-week { display: flex; gap: 8px; align-items: flex-end; height: 80px; }
  .mini-week .day {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .mini-week .bar-wrap { width: 100%; height: 60px; position: relative; }
  .mini-week .bar {
    position: absolute; bottom: 0; width: 100%; border-radius: 4px 4px 0 0;
    background: var(--accent); min-height: 2px; transition: height 0.3s;
  }
  .mini-week .bar.zero { background: var(--border); height: 2px !important; }
  .mini-week .count { font-size: 11px; color: var(--text-dim); }
  .mini-week .date { font-size: 10px; color: var(--text-dim); }
  .mini-week .bar.goal-met { background: var(--green-4); }
  .mini-week .bar.goal-unmet { background: var(--green-1); }

  /* 30天热力图 */
  .heatmap-30 {
    display: grid; grid-template-columns: repeat(auto-fill, 22px);
    gap: 3px;
  }
  .heatmap-30 .cell {
    width: 22px; height: 22px; border-radius: 3px;
    background: var(--green-0); position: relative; cursor: default;
  }
  .heatmap-30 .cell[data-level="1"] { background: var(--green-1); }
  .heatmap-30 .cell[data-level="2"] { background: var(--green-2); }
  .heatmap-30 .cell[data-level="3"] { background: var(--green-3); }
  .heatmap-30 .cell[data-level="4"] { background: var(--green-4); }
  .heatmap-30 .cell:hover::after {
    content: attr(data-tip); position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%); background: #1f2937; color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap;
    z-index: 10; border: 1px solid var(--border);
  }
  .legend {
    display: flex; align-items: center; gap: 4px; margin-top: 12px;
    justify-content: flex-end; font-size: 11px; color: var(--text-dim);
  }
  .legend .cell {
    width: 14px; height: 14px; border-radius: 2px; display: inline-block;
  }

  .recent-list .day-row {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .recent-list .day-row:last-child { border-bottom: none; }
  .recent-list .count { color: var(--accent); font-weight: 600; }
  .recent-list .goal-met { color: var(--green-4); }
  .recent-list .goal-unmet { color: var(--text-dim); }

  .no-data { text-align: center; color: var(--text-dim); padding: 40px 0; font-size: 15px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>健康打卡 <span>HealthTick</span></h1>
    <p>你的健康坚持记录</p>
  </header>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="value" id="totalCount">0</div><div class="label">总打卡次数</div></div>
    <div class="stat-card"><div class="value" id="todayCount">0</div><div class="label">今日打卡</div></div>
    <div class="stat-card"><div class="value" id="streakDays">0</div><div class="label">连续达标</div></div>
    <div class="stat-card"><div class="value" id="maxStreak">0</div><div class="label">最长连续</div></div>
    <div class="stat-card"><div class="value" id="totalDays">0</div><div class="label">活跃天数</div></div>
  </div>

  <div class="section">
    <h2>成就徽章</h2>
    <div class="badges" id="badges"></div>
  </div>

  <div class="section">
    <h2>最近 7 天</h2>
    <div class="mini-week" id="miniWeek"></div>
  </div>

  <div class="section">
    <h2>最近 30 天</h2>
    <div class="heatmap-30" id="heatmap30"></div>
    <div class="legend">
      <span>少</span>
      <span class="cell" style="background:var(--green-0)"></span>
      <span class="cell" style="background:var(--green-1)"></span>
      <span class="cell" style="background:var(--green-2)"></span>
      <span class="cell" style="background:var(--green-3)"></span>
      <span class="cell" style="background:var(--green-4)"></span>
      <span>多</span>
    </div>
  </div>

  <div class="section recent-list">
    <h2>最近 14 天明细</h2>
    <div id="recentList"></div>
  </div>
</div>

<script>
const WEEKDAYS = ['日','一','二','三','四','五','六'];
const BADGE_ICONS = ['🌱','🌿','🏅','💪','🏆'];

function dateStr(d) { return d.toISOString().slice(0,10); }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }

function countByDate(records) {
  const m = {};
  for (const r of records) m[r.date] = r.count || ((m[r.date]||0)+1);
  return m;
}
function totalRecords(records) { return records.reduce((s,r)=>s+(r.count||1),0); }

function getLevel(count, goal) {
  if (!count) return 0;
  const ratio = count / goal;
  if (ratio < 0.25) return 1;
  if (ratio < 0.5) return 2;
  if (ratio < 1) return 3;
  return 4;
}

function render(data) {
  const records = data.records || [];
  const goal = data.daily_goal || 8;
  const badges = data.badges || [];
  const maxStreak = data.max_streak || 0;
  const currentStreak = data.current_streak || 0;
  const dateMap = countByDate(records);
  const today = new Date();
  const todayStr = dateStr(today);

  // Stats
  document.getElementById('totalCount').textContent = totalRecords(records);
  document.getElementById('todayCount').textContent = dateMap[todayStr] || 0;
  document.getElementById('streakDays').textContent = currentStreak;
  document.getElementById('maxStreak').textContent = maxStreak;
  document.getElementById('totalDays').textContent = Object.keys(dateMap).length;

  // Badges
  const badgesEl = document.getElementById('badges');
  badgesEl.innerHTML = '';
  badges.forEach((b, i) => {
    const earned = maxStreak >= b[0];
    const div = document.createElement('div');
    div.className = 'badge' + (earned ? ' earned' : '');
    const pct = earned ? 100 : Math.min(100, Math.round(currentStreak / b[0] * 100));
    div.innerHTML = `
      <div class="icon">${BADGE_ICONS[i] || '🏅'}</div>
      <div class="name">${b[1]}</div>
      <div class="desc">${b[2]}</div>
      <div class="progress">${earned ? '已达成' : pct + '%'}</div>
    `;
    badgesEl.appendChild(div);
  });

  // Mini week (7 days bar chart)
  const miniWeek = document.getElementById('miniWeek');
  miniWeek.innerHTML = '';
  let maxCount = 1;
  for (let i = 6; i >= 0; i--) {
    const d = addDays(today, -i);
    const c = dateMap[dateStr(d)] || 0;
    if (c > maxCount) maxCount = c;
  }
  for (let i = 6; i >= 0; i--) {
    const d = addDays(today, -i);
    const ds = dateStr(d);
    const c = dateMap[ds] || 0;
    const h = c === 0 ? 0 : Math.max(8, (c / maxCount) * 55);
    const met = c >= goal;
    const day = document.createElement('div');
    day.className = 'day';
    day.innerHTML = `
      <div class="count">${c}</div>
      <div class="bar-wrap"><div class="bar ${c===0?'zero':met?'goal-met':'goal-unmet'}" style="height:${h}px"></div></div>
      <div class="date">${d.getMonth()+1}/${d.getDate()}</div>
    `;
    miniWeek.appendChild(day);
  }

  // 30-day heatmap
  const heatmap = document.getElementById('heatmap30');
  heatmap.innerHTML = '';
  for (let i = 29; i >= 0; i--) {
    const d = addDays(today, -i);
    const ds = dateStr(d);
    const c = dateMap[ds] || 0;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.setAttribute('data-level', getLevel(c, goal));
    cell.setAttribute('data-tip', `${ds}: ${c} 次${c>=goal?' ✓':''}`);
    heatmap.appendChild(cell);
  }

  // Recent 14 days
  const recentList = document.getElementById('recentList');
  if (!records.length) {
    recentList.innerHTML = '<div class="no-data">还没有打卡记录，开始你的健康之旅吧!</div>';
    return;
  }
  recentList.innerHTML = '';
  for (let i = 0; i < 14; i++) {
    const d = addDays(today, -i);
    const ds = dateStr(d);
    const c = dateMap[ds] || 0;
    const wd = WEEKDAYS[d.getDay()];
    const isToday = i === 0 ? ' (今天)' : '';
    const met = c >= goal;
    const row = document.createElement('div');
    row.className = 'day-row';
    row.innerHTML = `<span>${ds} 周${wd}${isToday}</span><span class="count ${met?'goal-met':'goal-unmet'}">${c} 次${met?' ✓':''}</span>`;
    recentList.appendChild(row);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  render(window.__HEALTH_TICK_DATA__ || { records: [] });
});
</script>
</body>
</html>
